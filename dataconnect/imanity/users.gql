mutation UpsertCurrentUser(
  $username: String!
  $displayName: String
  $email: String
  $guild: String
  $timezone: String
) @auth(level: USER) {
  appUser_upsert(data: {
    id_expr: "auth.uid"
    username: $username
    displayName: $displayName
    email: $email
    guild: $guild
    timezone: $timezone
    updatedAt_expr: "request.time"
  })
}

query GetCurrentUser @auth(level: USER) {
  appUser(key: { id_expr: "auth.uid" }) {
    id
    username
    displayName
    email
    guild
    role
    timezone
    createdAt
    updatedAt
  }
}

query ListAppUsers @auth(level: USER) {
  appUsers(orderBy: [{ guild: ASC }, { username: ASC }]) {
    id
    username
    displayName
    email
    guild
    role
  }
}

mutation UpdateUserRole($userId: String!, $role: String!) @auth(level: USER) {
  appUser_update(key: { id: $userId }, data: {
    role: $role
    updatedAt_expr: "request.time"
  })
}

mutation UpdateUserGuild($userId: String!, $guild: String) @auth(level: USER) {
  appUser_update(key: { id: $userId }, data: {
    guild: $guild
    updatedAt_expr: "request.time"
  })
}
