query ListGuildRoster($guild: String) @auth(level: USER) {
  mapleCharacters(
    where: { owner: { guild: { eq: $guild } } }
    orderBy: [{ level: DESC }, { name: ASC }]
  ) {
    ownerId
    region
    name
    jobName
    level
    worldName
    characterImgURL
    owner {
      username
      guild
      timezone
    }
  }
}

query ListAllianceRoster @auth(level: USER) {
  mapleCharacters(orderBy: [{ level: DESC }, { name: ASC }]) {
    ownerId
    region
    name
    jobName
    level
    worldName
    characterImgURL
    owner {
      username
      guild
      timezone
    }
  }
}

mutation CreateBossParty($bossId: String!, $label: String, $category: String, $timezone: String, $runTime: String) @auth(level: USER) {
  bossParty_insert(data: {
    bossId: $bossId
    label: $label
    category: $category
    timezone: $timezone
    runTime: $runTime
    ownerId_expr: "auth.uid"
  })
}

mutation DeleteBossParty($id: UUID!) @auth(level: USER) {
  bossParty_delete(key: { id: $id })
}

mutation UpsertPartyMember(
  $partyId: UUID!
  $slotIndex: Int!
  $characterOwnerId: String!
  $characterRegion: String!
  $characterName: String!
) @auth(level: USER) {
  bossPartyMember_upsert(data: {
    partyId: $partyId
    slotIndex: $slotIndex
    characterOwnerId: $characterOwnerId
    characterRegion: $characterRegion
    characterName: $characterName
    assignedById_expr: "auth.uid"
  })
}

mutation RemovePartyMember($partyId: UUID!, $slotIndex: Int!) @auth(level: USER) {
  bossPartyMember_delete(key: { partyId: $partyId, slotIndex: $slotIndex })
}

query ListPartiesByBoss($bossId: String!, $category: String) @auth(level: USER) {
  bossParties(
    where: { bossId: { eq: $bossId }, category: { eq: $category } }
    orderBy: [{ createdAt: DESC }]
  ) {
    id
    bossId
    label
    category
    timezone
    runTime
    ownerId
    createdAt
    members: bossPartyMembers_on_party(orderBy: [{ slotIndex: ASC }]) {
      slotIndex
      characterOwnerId
      characterRegion
      characterName
    }
  }
}
