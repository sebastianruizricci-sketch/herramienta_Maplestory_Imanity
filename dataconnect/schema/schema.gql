type AppUser @table(name: "app_user", key: "id") {
  id: String! @default(expr: "auth.uid")
  username: String! @unique @col(dataType: "varchar(40)")
  displayName: String @col(dataType: "varchar(80)")
  email: String @col(dataType: "varchar(160)")
  guild: String @col(dataType: "varchar(20)")
  timezone: String @col(dataType: "varchar(48)")
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type MapleCharacter @table(name: "maple_character", key: ["owner", "region", "name"]) {
  owner: AppUser!
  region: String! @col(dataType: "varchar(12)")
  name: String! @col(dataType: "varchar(32)")
  jobName: String @col(dataType: "varchar(80)")
  level: Int
  worldName: String @col(dataType: "varchar(80)")
  characterImgURL: String
  source: String @col(dataType: "varchar(40)")
  fetchedAt: Timestamp
  updatedAt: Timestamp! @default(expr: "request.time")
}

type BossParty @table(name: "boss_party", key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  bossId: String! @col(dataType: "varchar(40)")
  label: String @col(dataType: "varchar(80)")
  category: String @col(dataType: "varchar(20)")
  owner: AppUser!
  createdAt: Timestamp! @default(expr: "request.time")
  updatedAt: Timestamp! @default(expr: "request.time")
}

type BossPartyMember @table(name: "boss_party_member", key: ["party", "slotIndex"]) {
  party: BossParty!
  slotIndex: Int!
  characterOwnerId: String! @col(dataType: "varchar(128)")
  characterRegion: String! @col(dataType: "varchar(12)")
  characterName: String! @col(dataType: "varchar(32)")
  assignedBy: AppUser!
  assignedAt: Timestamp! @default(expr: "request.time")
}

type LegacyUser @table(name: "user", key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  createdAt: Timestamp! @col(name: "created_at")
  displayName: String @col(name: "display_name")
  email: String! @col(name: "email")
  lastLoginAt: Timestamp @col(name: "last_login_at")
  username: String! @col(name: "username")
}

type LegacyCharacter @table(name: "character", key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  user: LegacyUser
  characterName: String! @col(name: "character_name")
  createdAt: Timestamp! @col(name: "created_at")
  gameClass: String! @col(name: "game_class")
  gearScore: Int @col(name: "gear_score")
  level: Int!
  notes: String
  race: String
  specialization: String
}
